<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한국어 타자연습</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/keyboard.css">
  <link rel="stylesheet" href="css/modes.css">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <a href="#/" class="logo">⌨ 타자연습</a>
      <nav id="main-nav">
        <a href="#/" class="nav-item">홈</a>
        <a href="#/finger" class="nav-item">자리 연습</a>
        <a href="#/word" class="nav-item">낱말 연습</a>
        <a href="#/sentence" class="nav-item">단문 연습</a>
        <a href="#/exam" class="nav-item">타자 검정</a>
        <a href="#/game" class="nav-item">게임</a>
        <a href="#/results" class="nav-item">기록</a>
      </nav>
      <div id="header-lang-toggle" class="header-lang-toggle">
        <button class="header-lang-btn active" data-lang="ko">한글</button>
        <button class="header-lang-btn" data-lang="en">English</button>
      </div>
    </header>

    <main id="view-container">

      <!-- 홈 -->
      <section id="view-home" class="view">
        <div class="home-hero">
          <h1>한국어 타자연습</h1>
          <p>손가락 위치부터 타자 검정까지, 단계별로 연습하세요.</p>
        </div>
        <div class="home-cards">
          <a href="#/finger" class="home-card">
            <div class="card-icon">🖐</div>
            <h3>자리 연습</h3>
            <p>손가락 위치와 기본 자리를 익힙니다.</p>
          </a>
          <a href="#/word" class="home-card">
            <div class="card-icon">📝</div>
            <h3>낱말 연습</h3>
            <p>단어를 빠르고 정확하게 입력하는 연습입니다.</p>
          </a>
          <a href="#/sentence" class="home-card">
            <div class="card-icon">📄</div>
            <h3>단문 연습</h3>
            <p>짧은 문장을 타이핑하며 실력을 키웁니다.</p>
          </a>
          <a href="#/exam" class="home-card">
            <div class="card-icon">🏆</div>
            <h3>타자 검정</h3>
            <p>타수와 정확도를 측정하여 실력을 확인합니다.</p>
          </a>
          <a href="#/game" class="home-card">
            <div class="card-icon">🎮</div>
            <h3>게임</h3>
            <p>떨어지는 단어를 입력하는 액션 게임입니다.</p>
          </a>
        </div>
        <div class="home-stats">
          <div class="home-stat">
            <span class="hs-label">타자 검정 최고 기록</span>
            <span class="hs-value" id="home-best-wpm">-</span>
          </div>
          <div class="home-recent">
            <h4>최근 기록</h4>
            <ul id="home-recent-list"></ul>
          </div>
        </div>
      </section>

      <!-- 자리 연습 -->
      <section id="view-finger" class="view"></section>

      <!-- 낱말 연습 -->
      <section id="view-word" class="view"></section>

      <!-- 단문 연습 -->
      <section id="view-sentence" class="view"></section>

      <!-- 타자 검정 -->
      <section id="view-exam" class="view"></section>

      <!-- 게임 -->
      <section id="view-game" class="view"></section>

      <!-- 기록 -->
      <section id="view-results" class="view"></section>

    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
